<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSP and asset URIs are injected by SupportViewProvider.getHtml() at runtime.
       The placeholders below are replaced via simple string substitution. -->
  <meta http-equiv="Content-Security-Policy" content="__CSP__">
  <title>Support SSH Lite</title>
  <link rel="stylesheet" href="__STYLES_URI__">
</head>
<body>
  <!-- tabindex makes the panel keyboard-focusable so it can receive keydown for
       every key (incl. modifiers) once the user clicks into it. -->
  <div class="support-container" tabindex="0">
    <!-- Promo: a pixel-art coder typing, drawn by index.ts on a <canvas>.
         Internal resolution stays 160x120; CSS upscales it crisply
         (image-rendering:pixelated). Width follows the section width by default,
         but the zoom control below sets an independent pixel width capped at the
         section width (max-width:100%). Clicking the coder's shirt / mug /
         glasses recolours that part (handled in index.ts, no link). -->
    <div class="promo" title="Click the shirt, mug or glasses to recolour">
      <canvas id="promoCanvas" class="promo-img" width="160" height="120"></canvas>
    </div>

    <div class="zoom" aria-label="Animation zoom">
      <button id="zoomOut" class="zoom-btn" title="Zoom out">&#8722;</button>
      <button id="zoomFit" class="zoom-btn" title="Fit to width">Fit</button>
      <button id="zoomIn" class="zoom-btn" title="Zoom in">&#43;</button>
      <button id="settingsToggle" class="zoom-btn gear-btn" aria-expanded="false" aria-controls="npcSettings"
              title="NPC settings">&#9881;</button>
    </div>

    <!-- NPC settings: collapsed by default; the gear button toggles it. -->
    <div id="npcSettings" class="npc-settings collapsed" aria-label="NPC settings">
      <label class="npc-set-row"
             title="React when another VS Code window on this machine is active. Writes only a tiny activity beacon (timestamp + coarse category), never typed content — nothing leaves your machine.">
        <input type="checkbox" id="setCrossWindow"> React to other VS Code windows
      </label>

      <div class="npc-set-row npc-set-row-text">
        <span title="Text shown on the occasional cheering banner above the coder's head (next to a small Vietnam flag). Up to 5 characters; leave empty to show the flag only.">Banner text</span>
        <span class="npc-banner-controls">
          <input type="text" id="setBannerText" maxlength="5" autocomplete="off" spellcheck="false"
                 placeholder="VN"
                 title="Text shown on the cheering headband on the coder's forehead (next to a small Vietnam flag). Up to 5 characters; leave empty to show the flag only."
                 aria-label="Cheering banner text (max 5 characters)">
          <select id="setBannerMode"
                  title="When the cheering headband appears: occasionally, always, or never."
                  aria-label="When the cheering banner appears">
            <option value="occasional">Sometimes</option>
            <option value="always">Always</option>
            <option value="never">Never</option>
          </select>
        </span>
      </div>

      <div class="npc-hooks">
        <div class="npc-hooks-head"
             title="Installs a tiny prompt-submit hook into your AI tools so the coder can fly the words you actually type. Writes only to each tool's own hook config; safe to remove.">
          AI input hooks
        </div>
        <div id="hookList" class="npc-hooks-list"></div>
        <div class="npc-hooks-actions">
          <button id="installHooks" class="npc-btn" title="Add prompt hooks to the AI tools you have">Set up AI hooks</button>
          <button id="uninstallHooks" class="npc-btn npc-btn-secondary" title="Remove the hooks SSH Lite added">Remove</button>
        </div>
        <div id="hookMsg" class="npc-hooks-msg" role="status"></div>
      </div>
    </div>

    <div class="links">
      <button class="link-btn" data-cmd="reportIssue"><span class="ico">🐛</span> Report a bug or suggest a feature</button>
      <button class="link-btn" data-cmd="donate"><span class="ico">❤️</span> Donate, keep this project independent</button>
      <button class="link-btn" data-cmd="starGithub"><span class="ico">⭐</span> Star on GitHub</button>
      <button class="link-btn" data-cmd="rateMarketplace"><span class="ico">📝</span> Rate on Marketplace</button>
      <button class="link-btn" data-cmd="shareExtension"><span class="ico">🔗</span> Share extension</button>
    </div>
  </div>

  <script nonce="__NONCE__" src="__SCRIPT_URI__"></script>
</body>
</html>

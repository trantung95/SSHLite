# SSH test servers for integration testing
# Usage:   docker compose -f test-docker/docker-compose.yml up -d web api db
# Cleanup: docker compose -f test-docker/docker-compose.yml down
# Logs:    ./logs/<container-name>/sshd.log on host (volume-mounted)
#
# The compose project name is pinned to "hybr8-prod" so the three servers read
# as a production fleet in Docker UIs (group "hybr8-prod"; containers
# hybr8-prod-web-01 / -api-01 / -db-01) instead of the folder-derived
# "test-docker". Service keys (web/api/db) + container_name match each server's
# in-container hostname. The basic globalSetup/teardown drive this file by port
# and `down`, so these renames don't touch them; the chaos suite keys off
# container_name, kept in sync in ChaosConfig.ts, ContainerHealthMonitor.ts and
# globalSetup.chaos.ts / globalTeardown.chaos.ts.
name: hybr8-prod

services:
  # Production web - port 2201
  web:
    build:
      context: .
      dockerfile: Dockerfile.sshd
      args:
        SERVER_FLAVOR: prod-web
    container_name: hybr8-prod-web-01
    ports:
      - "2201:22"
    hostname: hybr8-prod-web-01
    volumes:
      - ./logs/hybr8-prod-web-01:/var/log/sshd

  # Production api - port 2202
  api:
    build:
      context: .
      dockerfile: Dockerfile.sshd
      args:
        SERVER_FLAVOR: prod-api
    container_name: hybr8-prod-api-01
    ports:
      - "2202:22"
    hostname: hybr8-prod-api-01
    volumes:
      - ./logs/hybr8-prod-api-01:/var/log/sshd

  # Production db - port 2203
  db:
    build:
      context: .
      dockerfile: Dockerfile.sshd
      args:
        SERVER_FLAVOR: prod-db
    container_name: hybr8-prod-db-01
    ports:
      - "2203:22"
    hostname: hybr8-prod-db-01
    volumes:
      - ./logs/hybr8-prod-db-01:/var/log/sshd

  # Server 4: "Sudo" - port 2204 — has sudo configured (NOPASSWD + password users)
  # Used by docker-ssh-sudo.test.ts to validate the v0.8.14 stderr-sync protocol.
  ssh-sudo-server:
    build:
      context: .
      dockerfile: Dockerfile.sshd-sudo
    container_name: sshlite-test-sudo
    ports:
      - "2204:22"
    hostname: sudo-server
    volumes:
      - ./logs/sshlite-test-sudo:/var/log/sshd

  # Server 5: "Manual smoke" - port 2215 — 4 distinct user configurations
  # (root / default-sudo / NOPASSWD-sudo / no-sudo) for hand-testing the
  # v0.8.15 save-as-root commands from the extension UI. Not used by any
  # automated jest suite — `docker compose up ssh-manual` brings it up by itself.
  # Port 2215 chosen to avoid colliding with multios.yml (2210-2214) and
  # ci.yml (2230-2234).
  ssh-manual:
    build:
      context: .
      dockerfile: Dockerfile.sshd-manual
    container_name: sshlite-manual
    ports:
      - "2215:22"
    hostname: manual-smoke
    volumes:
      - ./logs/sshlite-manual:/var/log/sshd

  # =========================================================================
  # SLOW / LAGGY servers — for reproducing timing-sensitive bugs (high ping,
  # jitter, packet loss, periodic disconnects). Two interchangeable approaches.
  # Full docs: test-docker/SLOW-SERVERS.md
  # =========================================================================

  # Server 6 (APPROACH 1): in-container tc/netem - port 2205
  # Same image as the base sshd (testuser/testpass, admin/adminpass, rich
  # seed-showcase tree) but the entrypoint applies Linux netem latency on eth0
  # and runs a periodic "blackout" loop to simulate intermittent disconnects.
  # Latency is tuned live via the env vars below (no rebuild). Requires the
  # NET_ADMIN capability for `tc` — without it the entrypoint logs a warning and
  # runs sshd with no impairment rather than crashing. Port 2205 chosen to sit
  # just above the base fleet (2201-2204) and below ssh-manual (2215).
  slow:
    build:
      context: .
      dockerfile: Dockerfile.sshd-slow
      args:
        SERVER_FLAVOR: prod-web
    container_name: hybr8-prod-slow-01
    hostname: hybr8-prod-slow-01
    ports:
      - "2205:22"
    cap_add:
      - NET_ADMIN
    environment:
      # Steady-state impairment (applied on startup).
      NETEM_DELAY: "300"      # base one-way delay, ms
      NETEM_JITTER: "80"      # delay jitter, ms (normal distribution)
      NETEM_LOSS: "3"         # steady-state packet loss, %
      # Periodic blackout loop (simulates intermittent disconnects).
      FLAKY_INTERVAL: "45"    # seconds between blackouts
      FLAKY_DOWN: "5"         # blackout duration, seconds (link -> 100% loss)
      FLAKY_ENABLED: "1"      # 1 = run the blackout loop, 0 = steady-state only
    volumes:
      - ./logs/hybr8-prod-slow-01:/var/log/sshd

  # Server 7 (APPROACH 2, backend): clean sshd, internal only - no host port.
  # This is a plain base-image server (prod-api flavor) that ONLY the toxiproxy
  # sidecar reaches over the compose network at slow-backend:22. No host port is
  # published — clients connect through toxiproxy on 2206 instead.
  slow-backend:
    build:
      context: .
      dockerfile: Dockerfile.sshd
      args:
        SERVER_FLAVOR: prod-api
    container_name: hybr8-prod-slow-backend
    hostname: slow-backend
    volumes:
      - ./logs/hybr8-prod-slow-backend:/var/log/sshd

  # Server 7 (APPROACH 2, proxy): Toxiproxy sidecar in front of slow-backend.
  # Forwards host port 2206 -> slow-backend:22. The proxy starts CLEAN (no
  # impairment, see toxiproxy.json); add latency/timeout/down "toxics" live via
  # the HTTP API on 8474 (run test-docker/toxiproxy-seed.sh). Toxics are runtime
  # state, so you can tune the impairment without a rebuild or restart.
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    container_name: hybr8-prod-toxiproxy
    command: ["-host=0.0.0.0", "-config=/config.json"]
    ports:
      - "2206:2206"   # proxied SSH (-> slow-backend:22)
      - "8474:8474"   # Toxiproxy HTTP API (add/remove toxics)
    volumes:
      - ./toxiproxy.json:/config.json:ro
    depends_on:
      - slow-backend

  # Server 8: FTP — port 2207 (issue #9). vsftpd (via delfer/alpine-ftp-server)
  # with a FIXED passive port range (21000-21010) published so basic-ftp's
  # passive-mode data connections work through Docker NAT (ADDRESS=127.0.0.1).
  # Login is testuser/testpass; the user is chrooted, so the FTP "home" is `/`.
  # Used by docker-ftp-fileops.test.ts. Port 2207 sits just above the
  # slow/toxiproxy pair (2205-2206) and below ssh-manual (2215). vsftpd (unlike
  # the pure-ftpd hardened image) permits RNFR/RNTO so rename is covered too.
  ftp:
    image: delfer/alpine-ftp-server
    container_name: sshlite-test-ftp
    ports:
      - "2207:21"
      - "21000-21010:21000-21010"
    environment:
      USERS: "testuser|testpass|/ftp/testuser"
      ADDRESS: "127.0.0.1"
      MIN_PORT: "21000"
      MAX_PORT: "21010"

  # Server 8b: pure-ftpd — port 2208 (issue #9). A DIFFERENT FTP implementation
  # from vsftpd, with different LIST/MLSD output, so the basic-ftp listing parser
  # and our IRemoteFile mapping are exercised against more than one server. TLS is
  # enabled (TLS_CN), so this server ALSO serves the FTPS (explicit TLS) path with
  # a self-signed cert (tests `secure` + sshLite.ftpRejectUnauthorized=false).
  # testuser/testpass, chrooted (home `/`), passive 30000-30009. Note: the
  # hardened image denies RNFR/RNTO, which exercises our graceful rename-failure
  # handling (a clean FTPError, no crash).
  ftp-pure:
    image: stilliard/pure-ftpd:hardened
    container_name: sshlite-test-ftp-pure
    ports:
      - "2208:21"
      - "30000-30009:30000-30009"
    environment:
      PUBLICHOST: "127.0.0.1"
      FTP_USER_NAME: "testuser"
      FTP_USER_PASS: "testpass"
      FTP_USER_HOME: "/home/testuser"
      FTP_PASSIVE_PORTS: "30000:30009"
      TLS_CN: "localhost"
      TLS_ORG: "SSHLiteTest"
      TLS_C: "US"
      ADDED_FLAGS: "--tls=1"

# SSH test servers for integration testing
# Usage:   docker compose -f test-docker/docker-compose.yml up -d web api db
# Cleanup: docker compose -f test-docker/docker-compose.yml down
# Logs:    ./logs/<container-name>/sshd.log on host (volume-mounted)
#
# The compose project name is pinned to "hybr8-prod" so the three servers read
# as a production fleet in Docker UIs (group "hybr8-prod"; containers
# hybr8-prod-web-01 / -api-01 / -db-01) instead of the folder-derived
# "test-docker". Service keys (web/api/db) + container_name match each server's
# in-container hostname. The basic globalSetup/teardown drive this file by port
# and `down`, so these renames don't touch them; the chaos suite keys off
# container_name, kept in sync in ChaosConfig.ts, ContainerHealthMonitor.ts and
# globalSetup.chaos.ts / globalTeardown.chaos.ts.
name: hybr8-prod

services:
  # Production web - port 2201
  web:
    build:
      context: .
      dockerfile: Dockerfile.sshd
      args:
        SERVER_FLAVOR: prod-web
    container_name: hybr8-prod-web-01
    ports:
      - "2201:22"
    hostname: hybr8-prod-web-01
    volumes:
      - ./logs/hybr8-prod-web-01:/var/log/sshd

  # Production api - port 2202
  api:
    build:
      context: .
      dockerfile: Dockerfile.sshd
      args:
        SERVER_FLAVOR: prod-api
    container_name: hybr8-prod-api-01
    ports:
      - "2202:22"
    hostname: hybr8-prod-api-01
    volumes:
      - ./logs/hybr8-prod-api-01:/var/log/sshd

  # Production db - port 2203
  db:
    build:
      context: .
      dockerfile: Dockerfile.sshd
      args:
        SERVER_FLAVOR: prod-db
    container_name: hybr8-prod-db-01
    ports:
      - "2203:22"
    hostname: hybr8-prod-db-01
    volumes:
      - ./logs/hybr8-prod-db-01:/var/log/sshd

  # Server 4: "Sudo" - port 2204 — has sudo configured (NOPASSWD + password users)
  # Used by docker-ssh-sudo.test.ts to validate the v0.8.14 stderr-sync protocol.
  ssh-sudo-server:
    build:
      context: .
      dockerfile: Dockerfile.sshd-sudo
    container_name: sshlite-test-sudo
    ports:
      - "2204:22"
    hostname: sudo-server
    volumes:
      - ./logs/sshlite-test-sudo:/var/log/sshd

  # Server 5: "Manual smoke" - port 2215 — 4 distinct user configurations
  # (root / default-sudo / NOPASSWD-sudo / no-sudo) for hand-testing the
  # v0.8.15 save-as-root commands from the extension UI. Not used by any
  # automated jest suite — `docker compose up ssh-manual` brings it up by itself.
  # Port 2215 chosen to avoid colliding with multios.yml (2210-2214) and
  # ci.yml (2230-2234).
  ssh-manual:
    build:
      context: .
      dockerfile: Dockerfile.sshd-manual
    container_name: sshlite-manual
    ports:
      - "2215:22"
    hostname: manual-smoke
    volumes:
      - ./logs/sshlite-manual:/var/log/sshd

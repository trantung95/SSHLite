# SSH test servers for integration testing
# Usage: docker compose -f test-docker/docker-compose.yml up -d
# Cleanup: docker compose -f test-docker/docker-compose.yml down
# Logs: ./logs/<container-name>/sshd.log on host (volume-mounted)

services:
  # Server 1: "Production" - port 2201
  ssh-server-1:
    build:
      context: .
      dockerfile: Dockerfile.sshd
    container_name: sshlite-test-server-1
    ports:
      - "2201:22"
    hostname: prod-server
    volumes:
      - ./logs/sshlite-test-server-1:/var/log/sshd

  # Server 2: "Staging" - port 2202
  ssh-server-2:
    build:
      context: .
      dockerfile: Dockerfile.sshd
    container_name: sshlite-test-server-2
    ports:
      - "2202:22"
    hostname: staging-server
    volumes:
      - ./logs/sshlite-test-server-2:/var/log/sshd

  # Server 3: "Dev" - port 2203
  ssh-server-3:
    build:
      context: .
      dockerfile: Dockerfile.sshd
    container_name: sshlite-test-server-3
    ports:
      - "2203:22"
    hostname: dev-server
    volumes:
      - ./logs/sshlite-test-server-3:/var/log/sshd

  # Server 4: "Sudo" - port 2204 — has sudo configured (NOPASSWD + password users)
  # Used by docker-ssh-sudo.test.ts to validate the v0.8.14 stderr-sync protocol.
  ssh-sudo-server:
    build:
      context: .
      dockerfile: Dockerfile.sshd-sudo
    container_name: sshlite-test-sudo
    ports:
      - "2204:22"
    hostname: sudo-server
    volumes:
      - ./logs/sshlite-test-sudo:/var/log/sshd

  # Server 5: "Manual smoke" - port 2215 — 4 distinct user configurations
  # (root / default-sudo / NOPASSWD-sudo / no-sudo) for hand-testing the
  # v0.8.15 save-as-root commands from the extension UI. Not used by any
  # automated jest suite — `docker compose up ssh-manual` brings it up by itself.
  # Port 2215 chosen to avoid colliding with multios.yml (2210-2214) and
  # ci.yml (2230-2234).
  ssh-manual:
    build:
      context: .
      dockerfile: Dockerfile.sshd-manual
    container_name: sshlite-manual
    ports:
      - "2215:22"
    hostname: manual-smoke
    volumes:
      - ./logs/sshlite-manual:/var/log/sshd
